document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

lapse: collapse; }\n    #page-portfolio .h-table thead th { font-family: var(--font-helv); font-size: 11.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); padding: 0 8px 14px; border-bottom: 1.5px solid var(--line); white-space: nowrap; }\n    #page-portfolio .h-table thead th:first-child { text-align: left; padding-left: 0; }\n    #page-portfolio .h-table thead th:not(:first-child) { text-align: right; }\n    #page-portfolio .h-row td { padding: 14px 8px; border-bottom: 1px solid var(--line); vertical-align: middle; font-family: var(--font-helv); font-size: 15px; font-weight: 600; color: var(--ink-soft); font-variant-numeric: tabular-nums; }\n    #page-portfolio .h-row:last-child td { border-bottom: none; }\n    #page-portfolio .h-row:hover td { background: #FBFBFE; }\n    #page-portfolio .h-ticker-cell { display: flex; align-items: center; gap: 11px; }\n    #page-portfolio .h-ticker-name { font-family: var(--font-helv); font-size: 15px; font-weight: 800; color: var(--ink); }\n    #page-portfolio .h-pl-cell { text-align: right; font-family: var(--font-helv); font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }\n    #page-portfolio .h-plpct-cell { text-align: right; font-family: var(--font-helv); font-size: 15px; font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }\n    #page-portfolio .cat-row td { font-family: var(--font-helv); font-size: 11px; font-weight: 800; letter-spacing: 0.09em; text-transform: uppercase; color: var(--ink-faint); background: var(--field); padding: 9px 8px 7px; border-bottom: 1px solid var(--line); }\n    .scrim { position: fixed; inset: 0; background: rgba(8,11,51,0.42); opacity: 0; pointer-events: none; transition: opacity 0.28s; z-index: 40; -webkit-backdrop-filter: blur(2px); backdrop-filter: blur(2px); }\n    .scrim.open { opacity: 1; pointer-events: auto; }\n    .sheet { position: fixed; z-index: 50; background: #fff; display: flex; flex-direction: column; top: 0; right: 0; height: 100vh; width: min(560px, 94vw); box-shadow: -24px 0 60px -20px rgba(8,11,51,0.5); transform: translateX(100%); transition: transform 0.34s cubic-bezier(0.32,0.72,0,1); }\n    .sheet.open { transform: translateX(0); }\n    .sheet-head { display: flex; align-items: flex-start; gap: 13px; height: 72px; padding: 26px 28px 18px; }\n    .sheet-title { font-family: var(--font-helv); font-size: 23px; font-weight: 700; letter-spacing: -0.01em; }\n    .sheet-close { margin-left: auto; flex-shrink: 0; width: 38px; height: 38px; border-radius: 50%; border: none; background: var(--field); color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.16s; }\n    .sheet-close:hover { background: #E9EBF7; }\n    .grabber { display: none; width: 42px; height: 5px; border-radius: 100px; background: var(--line); margin: 10px auto 0; flex-shrink: 0; }\n    .sheet-body { flex: 1; overflow-y: auto; padding: 2px 28px 32px; }\n    table.data { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }\n    table.data thead th { position: sticky; top: 0; background: #fff; z-index: 1; font-family: var(--font-helv); font-size: 11.5px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-faint); text-align: right; padding: 14px 8px 12px; border-bottom: 1.5px solid var(--line); white-space: nowrap; }\n    table.data thead th:first-child { text-align: left; }\n    table.data tbody td { font-family: var(--font-helv); font-size: 15px; font-weight: 600; color: var(--ink-soft); text-align: right; padding: 14px 8px; border-bottom: 1px solid var(--line); white-space: nowrap; }\n    table.data tbody td:first-child { text-align: left; }\n    table.data tbody tr:last-child td { border-bottom: none; }\n    table.data tbody tr:hover td { background: #FBFBFE; }\n    .tkr { font-weight: 800; color: var(--ink); }\n    .amt-gain { color: #16A34A; font-weight: 800; }\n    .amt-loss { color: #DC2626; font-weight: 800; }\n    .tag { display: inline-block; font-size: 11px; font-weight: 800; letter-spacing: 0.04em; padding: 4px 10px; border-radius: 100px; font-family: var(--font-helv); }\n    .tag.ltcg { background: rgba(16,185,129,0.12); color: #0B7355; }\n    .tag.stcg { background: rgba(58,78,214,0.12); color: var(--accent-deep); }\n    .tag.sell { background: rgba(71,80,121,0.12); color: var(--ink-soft); }\n    .tag.dep { background: rgba(16,185,129,0.12); color: #0B7355; }\n    .tag.wd { background: rgba(229,72,77,0.12); color: var(--rose); }\n    .tfoot { display: flex; flex-direction: column; align-items: flex-start; gap: 0; padding: 4px 0px 18px 1px; border-bottom: 1.5px solid var(--line); margin-bottom: 4px; }\n    .tfoot .lbl { font-family: var(--font-helv); font-size: 13px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.05em; }\n    .tfoot .val { font-family: var(--font-helv); font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }\n    .empty { text-align: center; color: var(--ink-faint); font-family: var(--font-helv); font-weight: 600; padding: 60px 20px; font-size: 15px; }\n    @media (max-width: 640px) {\n      #page-portfolio .cards { grid-template-columns: 1fr; }\n      #page-portfolio .card { min-height: 0; }\n      .source-actions { margin-left: 0; width: 100%; }\n      .source-actions .ghost-btn { flex: 1; justify-content: center; }\n      .sheet { top: auto; bottom: 0; right: 0; left: 0; width: 100%; height: auto; max-height: 86vh; border-radius: 24px 24px 0 0; transform: translateY(100%); box-shadow: 0 -20px 60px -20px rgba(8,11,51,0.5); }\n      .sheet.open { transform: translateY(0); }\n      .sheet-head { padding: 8px 22px 16px; }\n      .sheet-body { padding: 4px 18px 28px; }\n      .grabber { display: block; }\n      table.data tbody td, table.data thead th { padding-left: 5px; padding-right: 5px; font-size: 13.5px; }\n    }\n\n    /* ── Responsive ── */\n    @media (max-width: 720px) {\n      .layout { grid-template-columns: 1fr; }\n      .panel.inputs { border-right: none; border-bottom: 1px solid var(--line); }\n      .hero h1 { font-size: 32px !important; }\n    }\n  </style>\n  \n</head>\n<body>\n\n  <nav class=\"page-nav\" aria-label=\"Pages\">\n    <button class=\"page-nav-btn\" id=\"pageNavBtn\" aria-haspopup=\"listbox\" aria-expanded=\"false\" onclick=\"togglePageNav()\">\n      <span id=\"pageNavLabel\">Trade setup</span>\n      <svg class=\"page-nav-chevron\" width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"m6 9 6 6 6-6\"></path></svg>\n    </button>\n    <ul class=\"page-nav-menu\" id=\"pageNavMenu\" role=\"listbox\">\n      <li><button class=\"page-nav-item active\" id=\"navItemTrade\" type=\"button\" onclick=\"switchPage('trade');togglePageNav()\">Trade setup</button></li>\n      <li><button class=\"page-nav-item\" id=\"navItemPortfolio\" type=\"button\" onclick=\"switchPage('portfolio');togglePageNav()\">Portfolio</button></li>\n    </ul>\n  </nav>\n\n  <header class=\"hero\">\n    <h1 data-comment-anchor=\"14319829a0-h1\" style=\"font-weight: 600; font-size: 61px; letter-spacing: 0px\">Set your targets &amp; stops</h1>\n  </header>\n\n  <main class=\"layout\" id=\"page-trade\" data-screen-label=\"Targets &amp; Stops\">\n\n    <!-- Inputs -->\n    <section class=\"panel inputs\">\n      <div class=\"field-grid\">\n        <div class=\"field\" data-comment-anchor=\"38820d67c2-div\">\n          <span class=\"field-label\" data-comment-anchor=\"fa5ea68278-span\">Buy price</span>\n          <div class=\"input-wrap\">\n            <span class=\"currency\">$</span>\n            <input type=\"number\" id=\"amount\" value=\"1000\" min=\"0\" oninput=\"calculate()\">\n          </div>\n        </div>\n        <div class=\"field\">\n          <span class=\"field-label\">Sell price</span>\n          <div class=\"input-wrap\">\n            <span class=\"currency\">$</span>\n            <input type=\"number\" id=\"sellPrice\" min=\"0\" oninput=\"calculate()\" data-comment-anchor=\"ff0647c00f-input\">\n          </div>\n        </div>\n        <div class=\"field span-2\">\n          <span class=\"field-label\">Capital</span>\n          <div class=\"input-wrap\">\n            <span class=\"currency\">$</span>\n            <input type=\"number\" id=\"capital\" value=\"8000\" min=\"0\" oninput=\"calculate()\">\n          </div>\n        </div>\n      </div>\n\n      <div class=\"charges\" data-comment-anchor=\"8dc67bb3a8-div\">\n        <div class=\"charge-row buy-value\">\n          <span class=\"charge-label\">Quantity</span>\n          <span class=\"charge-val\" id=\"qtyOut\">—</span>\n        </div>\n        <div class=\"panel-title charge-head\" data-comment-anchor=\"06b1c478ec-div\">Charges</div>\n        <div class=\"charge-row\" data-comment-anchor=\"38fed71e58-div\">\n          <span class=\"charge-label\">Buy charge</span>\n          <span class=\"charge-val\" id=\"buyCharge\" data-comment-anchor=\"5fd6d28207-span\">—</span>\n        </div>\n        <div class=\"charge-row\">\n          <span class=\"charge-label\">Sell charge</span>\n          <span class=\"charge-val\" id=\"sellCharge\" data-comment-anchor=\"0d5c97ec59-span\">—</span>\n        </div>\n        <div class=\"charge-row total\" data-comment-anchor=\"afa036bcac-div\">\n          <span class=\"charge-label\" data-comment-anchor=\"0ca8913748-span\">Total charge</span>\n          <span class=\"charge-val\" id=\"totalCharge\" data-comment-anchor=\"2fe6b9531d-span\">—</span>\n        </div>\n      </div>\n    </section>\n\n    <!-- Output -->\n    <section class=\"panel output\" data-comment-anchor=\"278cd24b51-section\">\n      <div class=\"out-group\">\n        <div class=\"panel-title\">Exit levels</div>\n        <div class=\"level-grid\">\n          <div class=\"level-card gain\">\n            <span class=\"lvl-pct\" data-comment-anchor=\"ac237231a3-span\">+2% target <span class=\"lvl-at\" id=\"t2price\">@ —</span></span>\n            <div class=\"lvl-amount\" id=\"t2\" data-comment-anchor=\"42e2633126-div\">—<span class=\"delta\" id=\"t2d\" data-comment-anchor=\"ad7724fcfc-span\">—</span></div>\n          </div>\n          <div class=\"level-card loss\">\n            <span class=\"lvl-pct\">−0.5% stop <span class=\"lvl-at\" id=\"s05price\">@ —</span></span>\n            <div class=\"lvl-amount\" id=\"s05\">—<span class=\"delta\" id=\"s05d\" data-comment-anchor=\"d9a96e624f-span\">—</span></div>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"manual-box\" id=\"manualBox\" data-comment-anchor=\"35391a9fb6-div\">\n        <div class=\"manual-label\">Your sell result</div>\n        <div class=\"manual-pnl\" id=\"mPnl\">—</div>\n        <div class=\"manual-meta\">\n          <span>Sell value <b id=\"mSellVal\" data-comment-anchor=\"0f12b36926-b\">—</b></span>\n          <span><b id=\"mPnlPct\">—</b> return</span>\n        </div>\n        <div class=\"m-hint\" id=\"mHint\">Enter a sell price to see your net profit or loss after charges.</div>\n      </div>\n    </section>\n\n  </main>\n\n  <!-- Portfolio page (inlined from Portfolio.html) -->\n  <main id=\"page-portfolio\" data-screen-label=\"Portfolio\" hidden=\"\">\n\n    <div class=\"cards\">\n      <button class=\"card\" type=\"button\" onclick=\"openSheet('holdings')\">\n        <span class=\"card-pill\" id=\"holdCount\">—</span>\n        <span class=\"card-label\">Current Holdings</span>\n        <span class=\"card-value\" id=\"holdValue\">—</span>\n        <span class=\"card-sub\" id=\"holdSub\">Cost basis</span>\n        <span class=\"card-cta\" data-comment-anchor=\"2f79544a1a-span\">Details\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"></path><path d=\"m12 5 7 7-7 7\"></path></svg>\n        </span>\n      </button>\n\n      <button class=\"card\" type=\"button\" onclick=\"openSheet('realised')\">\n        <span class=\"card-pill\" id=\"realCount\">—</span>\n        <span class=\"card-label\">Realised P&amp;L</span>\n        <span class=\"card-value\" id=\"realValue\">—</span>\n        <span class=\"card-sub\" id=\"realSub\"></span>\n        <span class=\"card-cta\" data-comment-anchor=\"f83593b925-span\">Details\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"></path><path d=\"m12 5 7 7-7 7\"></path></svg>\n        </span>\n      </button>\n    </div>\n\n    <div class=\"source-bar\" data-comment-anchor=\"d5f4df79cc-div\">\n      <span class=\"source-dot\" id=\"srcDot\"></span>\n      <span class=\"source-text\" id=\"srcText\">Connecting to <b>Google Sheet</b>…</span>\n      <div class=\"source-actions\">\n        <button class=\"ghost-btn\" id=\"syncBtn\" onclick=\"syncNow()\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12a9 9 0 1 1-2.64-6.36\"></path><path d=\"M21 4v5h-5\"></path></svg>\n          Sync now\n        </button>\n      </div>\n    </div>\n\n  </main>\n\n  <!-- Sheet (side on desktop, bottom on mobile) -->\n  <div class=\"scrim\" id=\"scrim\" onclick=\"closeSheet()\"></div>\n  <aside class=\"sheet\" id=\"sheet\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"sheetTitle\">\n    <div class=\"grabber\"></div>\n    <div class=\"sheet-head\">\n      <div style=\"flex:1; min-width:0;\">\n        <h2 class=\"sheet-title\" id=\"sheetTitle\" data-comment-anchor=\"b08e635e8e-h2\">Holdings</h2>\n      </div>\n      <button class=\"sheet-close\" onclick=\"closeSheet()\" aria-label=\"Close\">\n        <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.6\" stroke-linecap=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"></path></svg>\n      </button>\n    </div>\n    <div class=\"sheet-body\" id=\"sheetBody\"></div>\n  </aside>\n\n  <script src=\"57ab2a61-5672-4350-b39e-fe403f3b70f7\"><\/script>\n\n  <script>\n    function fmt(v) {\n      return '$' + v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n    }\n    function fmtDelta(v) {\n      const sign = v >= 0 ? '+' : '\\u2212';\n      return sign + '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n    }\n    function fmtQty(v) {\n      return v.toLocaleString('en-US', { maximumFractionDigits: 4 });\n    }\n\n    const CHARGE_RATE = 0.00295;\n    const SELL_RATE   = 0.00295;\n    const CHARGE_CAP  = 25;\n    const charge = (value) => Math.min(value * CHARGE_RATE, CHARGE_CAP);\n\n    function calculate() {\n      const buyPrice  = parseFloat(document.getElementById('amount').value);\n      const capital   = parseFloat(document.getElementById('capital').value);\n      const sellPrice = parseFloat(document.getElementById('sellPrice').value);\n      const hasQty  = buyPrice > 0 && capital > 0;\n      // quantity is derived from capital ÷ buy price\n      const qty       = hasQty ? capital / buyPrice : 0;\n      const hasSell = sellPrice > 0;\n\n      // base position value (= capital deployed)\n      const buyValue  = hasQty ? capital : 0;\n      const sellValue = hasSell && hasQty ? sellPrice * qty : 0;\n      const buyCharge = hasQty ? charge(buyValue) : 0;\n      // sell charge = 0.00295 × sell value (sell price × total qty)\n      const sellCharge      = hasSell && hasQty ? sellValue * SELL_RATE : 0;\n      // displayed sell charge: actual once a sell price is entered, otherwise a buy-side estimate\n      const sellChargeDisp  = hasSell && hasQty ? sellCharge : buyCharge;\n      const totalChargeDisp = buyCharge + sellChargeDisp;\n\n      document.getElementById('qtyOut').textContent      = hasQty ? fmtQty(qty) : '—';\n      document.getElementById('buyCharge').textContent   = hasQty ? fmt(buyCharge) : '—';\n      document.getElementById('sellCharge').textContent  = hasQty ? fmt(sellChargeDisp) : '—';\n      document.getElementById('totalCharge').textContent = hasQty ? fmt(totalChargeDisp) : '—';\n\n      // ── Exit levels (fixed +2% target / −0.5% stop), net of round-trip charges ──\n      const set = (id, amount, delta) => {\n        document.getElementById(id).firstChild.textContent = fmt(amount);\n        document.getElementById(id + 'd').textContent      = fmtDelta(delta);\n      };\n      if (hasQty) {\n        // Net of charges: buy charge on buy value + sell charge on the exit's sell value.\n        const t2SellVal  = buyValue * 1.02;   // sell value at +2% target\n        const s05SellVal = buyValue * 0.995;  // sell value at −0.5% stop\n        const t2n = buyValue * 0.02  - (buyCharge + charge(t2SellVal));\n        const s05 = buyValue * 0.005 + (buyCharge + charge(s05SellVal));\n        set('t2',  buyValue + t2n, t2n);\n        set('s05', buyValue - s05, -s05);\n        // per-share price levels to set as limit / stop orders\n        document.getElementById('t2price').textContent  = '@ ' + fmt(buyPrice * 1.02);\n        document.getElementById('s05price').textContent = '@ ' + fmt(buyPrice * 0.995);\n      } else {\n        document.getElementById('t2price').textContent  = '@ —';\n        document.getElementById('s05price').textContent = '@ —';\n      }\n\n      // ── Manual sell result (precise P&L from user's sell price) ──\n      const box = document.getElementById('manualBox');\n      if (hasQty && hasSell) {\n        const realCharges = buyCharge + sellCharge;\n        const pnl = (sellValue - buyValue) - realCharges;\n        const pct = (pnl / buyValue) * 100;\n        const sign = pnl >= 0 ? '+' : '−';\n        box.classList.add('has-result');\n        box.classList.toggle('is-loss', pnl < 0);\n        document.getElementById('mPnl').textContent =\n          sign + '$' + Math.abs(pnl).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });\n        document.getElementById('mSellVal').textContent = fmt(sellValue);\n        document.getElementById('mPnlPct').textContent  = sign + Math.abs(pct).toFixed(2) + '%';\n      } else {\n        box.classList.remove('has-result', 'is-loss');\n        document.getElementById('mPnl').textContent     = '—';\n        document.getElementById('mSellVal').textContent = '—';\n        document.getElementById('mPnlPct').textContent  = '—';\n      }\n    }\n\n    calculate();\n\n    // ── Page switch ──\n    function switchPage(p) {\n      document.getElementById('page-trade').hidden = p !== 'trade';\n      const pp = document.getElementById('page-portfolio');\n      if (pp) pp.hidden = p !== 'portfolio';\n      document.querySelector('.hero h1').textContent =\n        p === 'trade' ? 'Set your targets & stops' : 'Portfolio';\n      const lbl = document.getElementById('pageNavLabel');\n      if (lbl) lbl.textContent = p === 'trade' ? 'Trade setup' : 'Portfolio';\n      const nt = document.getElementById('navItemTrade');\n      const np = document.getElementById('navItemPortfolio');\n      if (nt) nt.classList.toggle('active', p === 'trade');\n      if (np) np.classList.toggle('active', p === 'portfolio');\n      try { localStorage.setItem('calcPage', p); } catch (e) {}\n    }\n\n    // select the whole value on focus so typing overrides it\n    document.addEventListener('focusin', (e) => {\n      if (e.target.matches('input')) {\n        const el = e.target;\n        setTimeout(() => el.select(), 0);\n      }\n    });\n\n    // restore last viewed page\n    try {\n      const saved = localStorage.getItem('calcPage');\n      if (saved === 'portfolio') switchPage('portfolio');\n    } catch (e) {}\n  <\/script>\n  <script>\n  /* ── Portfolio logic (from Portfolio.html) ── */\n\n  /* This file only fetches the sheet and paints the dashboard.\n     All maths (cost-basis holdings, realised P/L, wallet, live value)\n     lives in uploads/tradebook-logic.js → buildDashboard(rows, opts). */\n\n  const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1OcQg4izJgwnzLuZUSw7vbCIG-Pg5Pu2rjDBG7NLiv1A/edit?gid=0#gid=0';\n  const LS_CAP = 'portfolio_start_capital';\n  const AUTO_REFRESH_MS = 12 * 60 * 60 * 1000; // 12 hours\n\n  const num   = window.toNum || (v => { const n = parseFloat(String(v).replace(/[^0-9.\\-]/g,'')); return isNaN(n)?0:n; });\n  const money = n => '$' + Number(n||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});\n  const sgn   = n => (n>=0?'+':'−') + '$' + Math.abs(Number(n||0)).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});\n  const pctS  = n => (n>=0?'+':'−') + Math.abs((n||0)*100).toFixed(1) + '%';\n  const esc   = s => String(s).replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));\n  const nowDateTime = () => { const d = new Date(); const mon = d.toLocaleString('en-US',{month:'short'}); const day = d.getDate(); const h = String(d.getHours()).padStart(2,'0'); const m = String(d.getMinutes()).padStart(2,'0'); return `${mon} ${day}, ${h}:${m}`; };\n  const isSell  = r => window.isBuy ? !window.isBuy(r) : String(r.Type||'').trim().toLowerCase() !== 'buy';\n  const isCashMove = r => { const t = String(r.Type||'').trim().toLowerCase(); return t==='deposit' || t==='withdrawal' || t==='withdraw'; };\n  const getCategory = r => String(r.Category || r.Strategy || r['Trade Type'] || r['Trade Style'] || r.Style || r['Trade Category'] || '').trim();\n  const isWithdrawal = r => { const t = String(r.Type||'').trim().toLowerCase(); return t==='withdrawal' || t==='withdraw'; };\n  const fmtDate = d => {\n    if(!d) return '—';\n    let dt;\n    const g = String(d).match(/^Date\\((\\d+),(\\d+),(\\d+)\\)$/); // gviz date: month is 0-indexed\n    if (g) dt = new Date(+g[1], +g[2], +g[3]);\n    else dt = new Date(d);\n    return isNaN(dt) ? String(d) : dt.toLocaleDateString('en-US',{day:'2-digit',month:'short',year:'numeric'});\n  };\n\n  /* ── Demo tradebook: rows keyed by the real sheet headers (1 row = 1 transaction) ── */\n  const DEMO_ROWS = [\n    // ── open holdings (buys only; AAOI shows two buys rolling into one avg cost) ──\n    { Date:'2025-11-04', Stock:'AAOI', QTY:48, 'Buy Price':169.00, Investment:8112.00, Type:'Buy', Charges:5.20 },\n    { Date:'2025-12-09', Stock:'AAOI', QTY:25, 'Buy Price':169.86, Investment:4246.46, Type:'Buy', Charges:3.10 },\n    { Date:'2025-10-21', Stock:'RKLB', QTY:20, 'Buy Price':99.71,  Investment:1994.12, Type:'Buy', Charges:2.40 },\n    { Date:'2026-01-15', Stock:'AXTI', QTY:13, 'Buy Price':93.54,  Investment:1216.07, Type:'Buy', Charges:1.80 },\n    // ── closed trades (buy + matching sell ⇒ netQty 0, surfaces on the P/L page) ──\n    { Date:'2025-09-02', Stock:'ASTS', QTY:30, 'Buy Price':18.01,  Investment:540.30,  Type:'Buy',  Charges:1.10 },\n    { Date:'2026-02-18', Stock:'ASTS', QTY:30, 'Sell Price':22.43, Sold:672.90,  'P/L':132.86, Type:'STCG', Charges:1.20 },\n    { Date:'2024-12-11', Stock:'WOLF', QTY:50, 'Buy Price':12.11,  Investment:605.50,  Type:'Buy',  Charges:1.00 },\n    { Date:'2026-03-04', Stock:'WOLF', QTY:50, 'Sell Price':14.20, Sold:710.00,  'P/L':101.89, Type:'LTCG', Charges:1.30 },\n    { Date:'2026-01-07', Stock:'CIFR', QTY:47, 'Buy Price':21.05,  Investment:997.05,  Type:'Buy',  Charges:7.70 },\n    { Date:'2026-04-12', Stock:'CIFR', QTY:47, 'Sell Price':22.10, Sold:1038.70, 'P/L':46.20,  Type:'STCG', Charges:1.40 },\n    { Date:'2026-02-02', Stock:'SOFI', QTY:60, 'Buy Price':8.52,   Investment:511.40,  Type:'Buy',  Charges:1.00 },\n    { Date:'2026-05-09', Stock:'SOFI', QTY:60, 'Sell Price':9.20,  Sold:552.00,  'P/L':38.40,  Type:'STCG', Charges:1.10 },\n    { Date:'2025-03-19', Stock:'PLTR', QTY:10, 'Buy Price':24.06,  Investment:240.60,  Type:'Buy',  Charges:0.90 },\n    { Date:'2026-05-22', Stock:'PLTR', QTY:10, 'Sell Price':27.00, Sold:270.00,  'P/L':27.30,  Type:'LTCG', Charges:0.80 },\n    { Date:'2026-04-28', Stock:'NVDA', QTY:4,  'Buy Price':118.10, Investment:472.40,  Type:'Buy',  Charges:1.20 },\n    { Date:'2026-06-03', Stock:'NVDA', QTY:4,  'Sell Price':114.50,Sold:458.00,  'P/L':-13.08, Type:'STCG', Charges:1.00 },\n    // ── wallet cash movements (no Stock; Type Deposit/Withdrawal) ──\n    { Date:'2025-12-01', Stock:'', Type:'Deposit',    Investment:5000.00, Charges:0 },\n    { Date:'2026-03-15', Stock:'', Type:'Withdrawal', Investment:3000.00, Charges:0 },\n  ];\n  const DEMO_PRICES  = { AAOI:161.85, RKLB:107.24, AXTI:89.22 };\n  const DEMO_CAPITAL = 20000;\n\n  let RAW = [];        // raw sheet rows keyed by header\n  let PRICES = {};     // { TICKER: livePrice }\n  let MODEL = null;    // buildDashboard() output\n  let demoMode = true; // showing sample data\n\n  function compute(){\n    let cap = localStorage.getItem(LS_CAP);\n    if ((cap === null || cap === '') && demoMode) cap = DEMO_CAPITAL;\n    const opts = { prices: PRICES };\n    if (cap !== null && cap !== '') opts.startingCapital = num(cap);\n    if (typeof window.buildDashboard !== 'function'){\n      MODEL = { summary:{ holdingsValue:0, holdingsCount:0, realisedPL:0, tradesClosed:0, winRate:0, totalCharges:0, liveValue:null, walletBalance:null }, holdings:[], pl:[] };\n      return;\n    }\n    MODEL = window.buildDashboard(RAW, opts);\n  }\n\n  /* ── Render dashboard cards ── */\n  function render(){\n    compute();\n    const s = MODEL.summary;\n    const hasLive = s.liveValue != null;\n\n    // Holdings\n    document.getElementById('holdValue').textContent = money(s.holdingsValue);\n    document.getElementById('holdCount').textContent = s.holdingsCount + (s.holdingsCount===1?' stock':' stocks');\n    const hSub = document.getElementById('holdSub');\n    if (hasLive){\n      hSub.innerHTML = 'Live ' + money(s.liveValue) + ' · <b>' + sgn(s.unrealisedPL) + ' (' + pctS(s.unrealisedPLpct) + ')</b>';\n      hSub.className = 'card-sub ' + (s.unrealisedPL>=0?'up':'down');\n    } else {\n      hSub.textContent = 'Cost basis (no live prices)';\n      hSub.className = 'card-sub';\n    }\n\n    // Wallet\n    const wv = document.getElementById('walletValue');\n    const ws = document.getElementById('walletSub');\n    if (wv){\n      if (s.walletBalance != null){\n        wv.textContent = money(s.walletBalance);\n        wv.style.color = '';\n        if (ws) ws.textContent = 'Capital − invested + cash booked';\n      } else {\n        wv.textContent = '—';\n        wv.style.color = 'var(--ink-faint)';\n        if (ws) ws.innerHTML = '<span class=\"accent\">Set starting capital →</span>';\n      }\n    }\n\n    // Realised\n    const rv = document.getElementById('realValue');\n    rv.textContent = sgn(s.realisedPL);\n    rv.className = 'card-value ' + (s.realisedPL>=0?'gain':'loss');\n    document.getElementById('realCount').textContent = s.tradesClosed + (s.tradesClosed===1?' trade':' trades');\n    document.getElementById('realSub').textContent = Math.round((s.winRate||0)*100) + '% win rate · ' + money(s.totalCharges) + ' fees';\n\n    // Wallet ledger pill (count of cash movements)\n    const moves = RAW.filter(isCashMove);\n    const wc = document.getElementById('walletCount');\n    if (wc){ if (moves.length){ wc.hidden = false; wc.textContent = moves.length + (moves.length===1?' txn':' txns'); } else { wc.hidden = true; } }\n  }\n\n  /* ── Holdings sheet: 3-col summary + bordered table ── */\n  function holdingsTable(){\n    const hs = MODEL.holdings;\n    if (!hs.length) return '<div class=\"empty\">No open holdings right now.</div>';\n    const s = MODEL.summary;\n    const hasLive = s.liveValue != null;\n\n    const plColor   = hasLive ? (s.unrealisedPL >= 0 ? '#16A34A' : '#DC2626') : 'var(--ink-faint)';\n    const sumPlVal  = hasLive ? sgn(s.unrealisedPL) : '—';\n    const sumPctVal = hasLive ? pctS(s.unrealisedPLpct || 0) : '';\n    const CELL = 'display:flex;flex-direction:column;gap:4px;padding:14px 16px;background:#fff';\n    const LBL  = 'font-family:var(--font-helv);font-size:11px;font-weight:800;letter-spacing:0.09em;text-transform:uppercase;color:var(--ink-faint)';\n    const VAL  = 'font-family:var(--font-helv);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2;color:var(--ink)';\n    const summary =\n      '<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-bottom:16px\">' +\n        '<div style=\"' + CELL + '\"><span style=\"' + LBL + '\">Invested</span><span style=\"' + VAL + '\">' + money(s.holdingsValue) + '</span></div>' +\n        '<div style=\"' + CELL + '\"><span style=\"' + LBL + '\">Current</span><span style=\"' + VAL + '\">' + (hasLive ? money(s.liveValue) : '—') + '</span></div>' +\n        '<div style=\"' + CELL + '\"><span style=\"' + LBL + '\">P&amp;L</span>' +\n          '<div><span style=\"' + VAL + ';color:' + plColor + '\">' + sumPlVal + '</span>' +\n          (sumPctVal ? '<span style=\"font-family:var(--font-helv);font-size:12px;font-weight:700;display:block;margin-top:1px;color:' + plColor + '\">' + sumPctVal + '</span>' : '') +\n          '</div>' +\n        '</div>' +\n      '</div>';\n\n    const tickerCat = {};\n    for (const r of RAW){ const t = String(r.Stock||'').trim().toUpperCase(); const c = getCategory(r); if (t && c) tickerCat[t] = c; }\n    const withCat = hs.map(h => ({...h, _cat: tickerCat[h.ticker.toUpperCase()] || ''}));\n    const cats = [...new Set(withCat.map(h => h._cat))];\n    const grouped = cats.some(c => c !== '');\n\n    const renderRow = h => {\n      const hasPrice = h.liveValue != null;\n      const gain = hasPrice && h.unrealisedPL >= 0;\n      const plClass   = hasPrice ? (gain ? 'amt-gain' : 'amt-loss') : '';\n      const rowPlVal  = hasPrice ? sgn(h.unrealisedPL) : '—';\n      const rowPctVal = hasPrice ? (gain ? '+' : '−') + Math.abs(h.unrealisedPLpct * 100).toFixed(1) + '%' : '—';\n      return '<tr>' +\n        '<td class=\"tkr\">' + esc(h.ticker) + '</td>' +\n        '<td>' + money(h.value) + '</td>' +\n        '<td>' + (hasPrice ? money(h.liveValue) : '<span style=\"color:var(--ink-faint)\">—</span>') + '</td>' +\n        '<td class=\"' + plClass + '\">' + rowPlVal + '</td>' +\n        '<td class=\"' + plClass + '\">' + rowPctVal + '</td>' +\n        '</tr>';\n    };\n\n    let body = '';\n    if (grouped){\n      for (const cat of cats){\n        const group = withCat.filter(h => h._cat === cat);\n        if (!group.length) continue;\n        body += '<tr class=\"cat-row\"><td colspan=\"5\">' + esc(cat||'Uncategorised') + '</td></tr>';\n        body += group.map(renderRow).join('');\n      }\n    } else {\n      body = withCat.map(renderRow).join('');\n    }\n\n    return summary +\n      '<div style=\"border-width:0px;border-radius:16px;overflow:hidden\">' +\n        '<table class=\"data\">' +\n          '<thead><tr>' +\n            '<th>Stock</th>' +\n            '<th>Buy Value</th>' +\n            '<th>Curr. Value</th>' +\n            '<th>P&amp;L</th>' +\n            '<th>P&amp;L %</th>' +\n          '</tr></thead>' +\n          '<tbody>' + body + '</tbody>' +\n        '</table>' +\n      '</div>';\n  }\n\n    /* ── Realised P/L table (one row per booked sell: Sell · STCG · LTCG — cash moves excluded) ── */\n  function realisedTable(){\n    const sells = RAW.filter(r => String(r.Stock||'').trim() && isSell(r) && !isCashMove(r));\n    if (!sells.length) return '<div class=\"empty\">No booked trades yet.</div>';\n    const tagClass = t => { t = t.toLowerCase(); return t==='ltcg' ? 'ltcg' : t==='stcg' ? 'stcg' : 'sell'; };\n\n    const withCat = sells.map(r => ({...r, _cat: getCategory(r) || ''}));\n    const cats = [...new Set(withCat.map(r => r._cat))];\n    const grouped = cats.some(c => c !== '');\n\n    const renderRow = r => {\n      const pl = num(r['P/L']);\n      const type = String(r.Type||'Sell').trim();\n      return `<tr><td class=\"tkr\">${esc(r.Stock)}</td><td class=\"${pl>=0?'amt-gain':'amt-loss'}\">${sgn(pl)}</td><td><span class=\"tag ${tagClass(type)}\">${esc(type)}</span></td></tr>`;\n    };\n\n    let body = '';\n    if (grouped){\n      for (const cat of cats){\n        const group = withCat.filter(r => r._cat === cat);\n        if (!group.length) continue;\n        body += `<tr class=\"cat-row\"><td colspan=\"3\">${esc(cat || 'Uncategorised')}</td></tr>`;\n        body += group.map(renderRow).join('');\n      }\n    } else {\n      body = withCat.map(renderRow).join('');\n    }\n\n    const s = MODEL.summary;\n    return `<div class=\"tfoot\"><span class=\"val\" style=\"color:${s.realisedPL>=0?'#16A34A':'#DC2626'}\">${sgn(s.realisedPL)}</span><span class=\"lbl\">${s.tradesClosed} trades · ${Math.round((s.winRate||0)*100)}% win rate</span></div>\n      <table class=\"data\">\n      <thead><tr><th>Stock</th><th>Realised</th><th>Type</th></tr></thead>\n      <tbody>${body}</tbody></table>`;\n  }\n\n  /* ── Wallet cash ledger (deposits & withdrawals only, with running balance) ── */\n  function walletLedgerTable(){\n    const moves = RAW.filter(isCashMove)\n      .slice().sort((a,b) => String(a.Date||'').localeCompare(String(b.Date||'')));\n    let cap = localStorage.getItem(LS_CAP);\n    if ((cap===null||cap==='') && demoMode) cap = DEMO_CAPITAL;\n    const hasCap = (cap!==null && cap!=='');\n    const capNum = hasCap ? num(cap) : 0;\n\n    if (!moves.length && !hasCap){\n      return '<div class=\"empty\">No cash movements yet.</div>';\n    }\n\n    let bal = capNum;\n    const rows = [];\n    if (hasCap){\n      rows.push(`<tr>\n        <td>—</td>\n        <td><span class=\"tag dep\">OPENING</span></td>\n        <td>${money(capNum)}</td>\n      </tr>`);\n    }\n    let totalDep = 0, totalWd = 0;\n    for (const r of moves){\n      const wd = isWithdrawal(r);\n      const amt = num(r.Investment) || num(r.Sold);\n      if (wd){ bal -= amt; totalWd += amt; } else { bal += amt; totalDep += amt; }\n      rows.push(`<tr>\n        <td>${esc(fmtDate(r.Date))}</td>\n        <td><span class=\"tag ${wd?'wd':'dep'}\">${wd?'OUT':'IN'}</span></td>\n        <td class=\"${wd?'amt-loss':'amt-gain'}\">${wd?'−':'+'}${money(amt)}</td>\n      </tr>`);\n    }\n    return `<div class=\"tfoot\"><span class=\"val\">${money(bal)}</span></div>\n      <table class=\"data\">\n      <thead><tr><th>Date</th><th>Flow</th><th>Amount</th></tr></thead>\n      <tbody>${rows.join('')}</tbody></table>`;\n  }\n\n  /* ── Sheet open/close ── */\n  function openSheet(kind){\n    if (kind==='holdings'){\n      document.getElementById('sheetTitle').textContent = 'Current Holdings';\n      document.getElementById('sheetBody').innerHTML = holdingsTable();\n    } else if (kind==='wallet'){\n      document.getElementById('sheetTitle').textContent = 'Wallet Balance';\n      document.getElementById('sheetBody').innerHTML = walletLedgerTable();\n    } else {\n      document.getElementById('sheetTitle').textContent = 'Realised P&L';\n      document.getElementById('sheetBody').innerHTML = realisedTable();\n    }\n    document.getElementById('sheet').classList.add('open');\n    document.getElementById('scrim').classList.add('open');\n    document.body.style.overflow = 'hidden';\n  }\n  function closeSheet(){\n    document.getElementById('sheet').classList.remove('open');\n    document.getElementById('scrim').classList.remove('open');\n    document.body.style.overflow = '';\n  }\n\n  document.addEventListener('keydown', e => { if (e.key === 'Escape'){ closeSheet(); } });\n\n  /* ── Source bar state ── */\n  function setSource(state, when){\n    const dot = document.getElementById('srcDot');\n    const txt = document.getElementById('srcText');\n    if (state === 'live'){\n      dot.classList.add('live');\n      txt.innerHTML = when ? 'Last synced ' + when : 'Live';\n    } else if (state === 'loading'){\n      dot.classList.remove('live');\n      txt.innerHTML = 'Syncing with <b>Google Sheet</b>&#8230;';\n    } else {\n      dot.classList.remove('live');\n      txt.innerHTML = '<span style=\"color:var(--rose)\">Couldn\\'t load sheet data</span> · will retry in 12 hrs';\n    }\n  }\n\n  /* ──────────────── Google Sheets loading (no API key, no backend) ────────────────\n     • Normal share link (…/spreadsheets/d/<ID>/edit), shared \"Anyone with the link →\n       Viewer\": read via the CORS-friendly gviz JSON endpoint.\n     • \"Publish to web → CSV\" link (contains output=csv): fetched and parsed as CSV.\n     Rows are returned keyed by their sheet headers and handed straight to buildDashboard. */\n  function sheetIdFrom(url){ const m = url.match(/\\/spreadsheets\\/d\\/([a-zA-Z0-9-_]+)/); return m ? m[1] : null; }\n  function gidFrom(url){ const m = url.match(/[#&?]gid=([0-9]+)/); return m ? m[1] : null; }\n\n  async function loadFromUrl(url){\n    if (/output=csv/.test(url) || /\\/pub\\?/.test(url)){\n      return parseCSV(await (await fetch(url)).text());\n    }\n    const id = sheetIdFrom(url);\n    if (!id) throw new Error(\"That doesn't look like a Google Sheets link.\");\n    const gid = gidFrom(url);\n    const gvizUrl = `https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json` + (gid ? `&gid=${gid}` : '');\n    return parseGviz(await (await fetch(gvizUrl)).text());\n  }\n\n  /* Optional live-price tab. Best effort — silent if absent. */\n  async function loadPrices(url){\n    try {\n      const id = sheetIdFrom(url);\n      if (!id) return {};\n      const rows = parseGviz(await (await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:json&sheet=Prices`)).text());\n      const out = {};\n      for (const r of rows){\n        const t = String(r.Ticker || r.Stock || r.Symbol || '').trim().toUpperCase();\n        const p = num(r['Live Price'] != null ? r['Live Price'] : (r.Price != null ? r.Price : r.LTP));\n        if (t && p) out[t] = p;\n      }\n      return out;\n    } catch(_) { return {}; }\n  }\n\n  function parseGviz(raw){\n    const json = JSON.parse(raw.match(/setResponse\\(([\\s\\S]*)\\);?\\s*$/)[1]);\n    let cols = json.table.cols.map(c => (c.label||'').trim());\n    let dataRows = json.table.rows || [];\n    if (cols.filter(Boolean).length === 0 && dataRows.length){    // no header labels → use first row\n      cols = (dataRows[0].c||[]).map(c => (c && c.v!=null) ? String(c.v).trim() : '');\n      dataRows = dataRows.slice(1);\n    }\n    return dataRows.map(r => {\n      const o = {};\n      (r.c||[]).forEach((cell, i) => { if (cols[i]) o[cols[i]] = cell ? (cell.v!=null ? cell.v : '') : ''; });\n      return o;\n    }).filter(o => Object.values(o).some(v => v !== '' && v != null));\n  }\n\n  function parseCSV(text){\n    const lines = [];\n    let row = [], cell = '', q = false;\n    for (let i=0; i<text.length; i++){\n      const c = text[i];\n      if (q){\n        if (c==='\"' && text[i+1]==='\"'){ cell+='\"'; i++; }\n        else if (c==='\"'){ q=false; }\n        else cell+=c;\n      } else {\n        if (c==='\"') q=true;\n        else if (c===','){ row.push(cell); cell=''; }\n        else if (c==='\\n'){ row.push(cell); lines.push(row); row=[]; cell=''; }\n        else if (c==='\\r'){ /* skip */ }\n        else cell+=c;\n      }\n    }\n    if (cell!=='' || row.length){ row.push(cell); lines.push(row); }\n    if (!lines.length) return [];\n    const header = lines.shift().map(h => h.trim());\n    return lines.filter(l => l.some(c => c!=='')).map(l => {\n      const o = {}; header.forEach((h,i) => { if (h) o[h] = (l[i]||'').trim(); }); return o;\n    });\n  }\n\n  async function syncNow(){\n    const btn = document.getElementById('syncBtn');\n    btn.style.opacity = '0.5';\n    btn.style.pointerEvents = 'none';\n    setSource('loading');\n    try {\n      const rows = await loadFromUrl(SHEET_URL);\n      if (rows.length){ RAW = rows; PRICES = await loadPrices(SHEET_URL); demoMode = false; render(); }\n      setSource('live', nowDateTime());\n    } catch(e){ setSource('error'); }\n    btn.style.opacity = '';\n    btn.style.pointerEvents = '';\n  }\n\n  /* ── Boot ── */\n  (function init(){\n    // Show demo data immediately while the real sheet loads\n    RAW = DEMO_ROWS.map(r => ({...r}));\n    PRICES = {...DEMO_PRICES};\n    render();\n    // Load live data from the hardcoded sheet\n    syncNow();\n    // Auto-refresh every 12 hours\n    setInterval(syncNow, AUTO_REFRESH_MS);\n  })();\n  \n  \n  function togglePageNav() {\n    var btn  = document.getElementById('pageNavBtn');\n    var menu = document.getElementById('pageNavMenu');\n    var open = btn.getAttribute('aria-expanded') === 'true';\n    btn.setAttribute('aria-expanded', String(!open));\n    menu.classList.toggle('open', !open);\n  }\n  document.addEventListener('click', function(e) {\n    var nav = document.querySelector('.page-nav');\n    if (nav && !nav.contains(e.target)) {\n      var b = document.getElementById('pageNavBtn');\n      var m = document.getElementById('pageNavMenu');\n      if (b) b.setAttribute('aria-expanded', 'false');\n      if (m) m.classList.remove('open');\n    }\n  });\n  <\/script>\n\n\n</body></html>"
</script>
